# 1. Database Connection URL (Replace with your server, port, and database name)
spring.datasource.url=jdbc:sqlserver://emp-server1.database.windows.net:1433;database=employeeDB1;user=emp-server1@emp-server1;password={your_password_here};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;

# 2. Database Authentication Credentials
spring.datasource.username=emp-server1
spring.datasource.password=Postmaster@2026

# 3. Database Driver Class Name (Matches your database vendor)
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver





# JPA & Hibernate Configurations

#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

