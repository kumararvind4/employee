<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Save Employee</h2>
        <form th:action="@{/employees/saveEmployee}" th:object="${employee}" method="POST">
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control" placeholder="azure" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control" placeholder="cloud" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="azure.cloud@azure.com" required>
            </div>
            <button type="submit" class="btn btn-success">Save Employee</button>
            <a th:href="@{/employees}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
</body>
</html>
