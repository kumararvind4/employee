<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
            min-height: 100vh;
        }

        .employee-card {
            margin-top: 60px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .card-body {
            padding: 30px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 10px rgba(13, 110, 253, 0.3);
        }

        .btn-save {
            background: linear-gradient(90deg, #198754, #20c997);
            border: none;
            border-radius: 25px;
            padding: 10px 25px;
            font-weight: 600;
        }

        .btn-back {
            border-radius: 25px;
            padding: 10px 25px;
        }

        label {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>

<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Save Employee</h2>
        <form th:action="@{/employees/saveEmployee}" th:object="${employee}" method="POST">
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control" placeholder="Enter First Name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control" placeholder="Enter Last Name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="example@company.com" required>
            </div>
            <button type="submit" class="btn btn-success">Save Employee</button>
            <a th:href="@{/employees}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
</body>
</html>
